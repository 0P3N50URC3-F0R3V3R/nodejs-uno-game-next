<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO Forum</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0a05;color:#d4cda4;font-family:"Trebuchet MS",sans-serif;min-height:100vh;padding-top:54px}
a{color:#ffb833;text-decoration:none}
a:hover{color:#ffdd00}
button{font-family:inherit;cursor:pointer;border-radius:4px;border:1px solid;transition:background .15s}
input,textarea{font-family:inherit;background:rgba(0,0,0,0.5);border:1px solid rgba(154,101,21,0.6);border-radius:4px;color:#d4cda4;padding:6px 10px;outline:none;width:100%}
input:focus,textarea:focus{border-color:#ffb833}
textarea{resize:vertical;min-height:120px}
select{font-family:inherit;background:rgba(0,0,0,0.6);border:1px solid rgba(154,101,21,0.5);border-radius:4px;color:#d4cda4;padding:4px 8px;outline:none;cursor:pointer;font-size:11px}
select:focus{border-color:#ffb833}
.btn{padding:5px 14px;font-size:12px;font-weight:bold;letter-spacing:.8px}
.btn-gold{background:rgba(154,101,21,0.25);border-color:rgba(154,101,21,0.7);color:#ffdd00}.btn-gold:hover{background:rgba(154,101,21,0.5)}
.btn-red{background:rgba(180,30,30,0.25);border-color:rgba(220,60,60,0.5);color:#ffaaaa}.btn-red:hover{background:rgba(220,30,30,0.45)}
.btn-dim{background:transparent;border-color:#444;color:#888}.btn-dim:hover{border-color:#888;color:#aaa}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px;letter-spacing:.5px}
/* HEADER */
#f-hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,#1a0e00,#110900);border-bottom:1px solid rgba(154,101,21,0.4);height:54px;display:flex;align-items:center;padding:0 16px;gap:12px}
#f-logo{font-size:16px;font-weight:bold;letter-spacing:3px;color:#ffdd00;white-space:nowrap;text-decoration:none}
#f-logo span{color:rgba(255,221,0,0.4)}
#f-breadcrumb{flex:1;font-size:11px;color:rgba(212,205,164,0.5);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;min-width:0}
#f-breadcrumb a{color:rgba(212,205,164,0.5)}
#f-user{display:flex;align-items:center;gap:8px;flex-shrink:0;font-size:12px}
.f-uname{color:#ffb833;font-weight:bold}
.f-role-mod{background:rgba(40,180,120,0.2);border:1px solid rgba(40,180,120,0.5);color:#44ddaa;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:bold;letter-spacing:.5px}
.f-role-admin{background:rgba(200,160,0,0.2);border:1px solid rgba(200,160,0,0.5);color:#ffdd00;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:bold;letter-spacing:.5px}
.f-game-link{font-size:11px;color:rgba(212,205,164,0.4);border:1px solid #333;border-radius:4px;padding:3px 8px;white-space:nowrap;text-decoration:none}
.f-game-link:hover{color:#d4cda4;border-color:#666}
#f-lang-sel{max-width:110px}
/* MAIN */
#f-app{max-width:960px;margin:0 auto;padding:24px 16px}
.f-error{color:#ff6666;font-size:12px;margin:8px 0;padding:8px 12px;background:rgba(220,30,30,0.1);border:1px solid rgba(220,30,30,0.3);border-radius:4px}
.f-loading{color:rgba(212,205,164,0.4);font-size:12px;padding:40px 0;text-align:center}
.f-empty{color:rgba(212,205,164,0.35);font-size:12px;padding:32px 0;text-align:center;font-style:italic}
/* BOARDS */
.f-section-title{font-size:12px;letter-spacing:2px;color:rgba(212,205,164,0.4);margin-bottom:14px;text-transform:uppercase}
.board-card{display:flex;align-items:center;gap:16px;background:rgba(0,0,0,0.4);border:1px solid rgba(154,101,21,0.3);border-radius:8px;padding:16px 20px;margin-bottom:10px;transition:border-color .15s;text-decoration:none;color:inherit;cursor:pointer}
.board-card:hover{border-color:rgba(154,101,21,0.7);background:rgba(0,0,0,0.6)}
.board-icon{font-size:24px;flex-shrink:0;width:40px;text-align:center;opacity:.8}
.board-info{flex:1;min-width:0}
.board-name{font-size:15px;font-weight:bold;color:#d4cda4;margin-bottom:3px}
.board-desc{font-size:12px;color:rgba(212,205,164,0.5);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.board-meta{font-size:11px;color:rgba(212,205,164,0.35);display:flex;gap:16px}
.board-last{font-size:11px;color:rgba(212,205,164,0.35);flex-shrink:0;text-align:right}
/* THREADS */
.f-board-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.f-board-hdr-info{flex:1}
.f-page-title{font-size:18px;font-weight:bold;color:#ffdd00;letter-spacing:1px;margin-bottom:4px}
.f-page-desc{font-size:12px;color:rgba(212,205,164,0.45)}
.thread-list{border:1px solid rgba(154,101,21,0.3);border-radius:8px;overflow:hidden;background:rgba(0,0,0,0.3)}
.thread-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(154,101,21,0.15);text-decoration:none;color:inherit;transition:background .15s}
.thread-row:last-child{border-bottom:none}
.thread-row:hover{background:rgba(154,101,21,0.08)}
.thread-flags{display:flex;flex-direction:column;align-items:center;gap:4px;width:22px;flex-shrink:0}
.flag-pin{color:#ffdd00;font-size:12px}
.flag-lock{color:rgba(212,205,164,0.4);font-size:12px}
.thread-main{flex:1;min-width:0}
.thread-title{font-size:14px;color:#d4cda4;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thread-row:hover .thread-title{color:#fff}
.thread-sub{font-size:11px;color:rgba(212,205,164,0.4)}
.thread-sub .t-author{color:rgba(212,205,164,0.6)}
.thread-stats{text-align:right;flex-shrink:0;font-size:11px;color:rgba(212,205,164,0.4)}
.thread-stats .ts-num{font-size:14px;color:rgba(212,205,164,0.6);font-weight:bold;display:block}
.badge-locked{display:inline-block;font-size:9px;color:#888;border:1px solid #444;border-radius:3px;padding:1px 5px;margin-left:6px;vertical-align:middle}
.badge-pinned{display:inline-block;font-size:9px;color:#ffdd00;border:1px solid rgba(255,221,0,0.4);border-radius:3px;padding:1px 5px;margin-left:6px;vertical-align:middle}
/* PAGINATION */
.f-pag{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 0}
.f-pag-info{font-size:11px;color:rgba(212,205,164,0.4)}
/* THREAD VIEW */
.thread-view-hdr{margin-bottom:20px}
.thread-view-title{font-size:17px;font-weight:bold;color:#d4cda4;line-height:1.35;margin-bottom:8px}
.thread-view-meta{font-size:11px;color:rgba(212,205,164,0.4);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.thread-mod-bar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 14px}
/* POSTS */
.post-card{background:rgba(0,0,0,0.4);border:1px solid rgba(154,101,21,0.25);border-radius:8px;margin-bottom:12px;overflow:hidden}
.post-card.post-first{border-color:rgba(154,101,21,0.4)}
.post-meta{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(154,101,21,0.15);flex-wrap:wrap}
.post-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;border:1px solid rgba(154,101,21,0.4);flex-shrink:0}
.post-author-info{flex:1;min-width:0}
.post-uname{font-size:13px;font-weight:bold;color:#d4cda4}
.post-stats{font-size:10px;color:rgba(212,205,164,0.4)}
.post-date{font-size:10px;color:rgba(212,205,164,0.35);flex-shrink:0;text-align:right}
.post-edited{font-size:9px;color:#666;font-style:italic}
.post-body{padding:14px 16px}
.post-content{font-size:13px;line-height:1.7;word-break:break-word;overflow-wrap:break-word}
.post-content p{margin-bottom:.8em}.post-content p:last-child{margin-bottom:0}
.post-content pre{background:rgba(0,0,0,0.5);border:1px solid #333;border-radius:4px;padding:10px 12px;overflow-x:auto;margin:.6em 0}
.post-content code{background:rgba(0,0,0,0.4);border:1px solid #333;border-radius:3px;padding:1px 5px;font-size:12px;font-family:Consolas,monospace}
.post-content pre code{background:none;border:none;padding:0;font-size:12px}
.post-content blockquote{border-left:3px solid rgba(154,101,21,0.5);padding:4px 12px;margin:.5em 0;color:rgba(212,205,164,0.6);font-style:italic}
.post-content h1,.post-content h2,.post-content h3{color:#ffb833;margin:.8em 0 .4em}
.post-content h1{font-size:17px}.post-content h2{font-size:15px}.post-content h3{font-size:13px}
.post-content a{color:#ffb833}.post-content a:hover{color:#ffdd00}
.post-content img{max-width:100%;border-radius:4px;margin:4px 0}
.post-attachments{padding:0 16px 10px;display:flex;flex-wrap:wrap;gap:8px}
.post-att-img{max-width:200px;max-height:150px;border-radius:4px;border:1px solid rgba(154,101,21,0.3)}
.post-att-file{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.3);border:1px solid rgba(154,101,21,0.3);border-radius:4px;padding:6px 10px;font-size:11px;color:#d4cda4;text-decoration:none}.post-att-file:hover{border-color:rgba(154,101,21,0.6)}
.post-actions{display:flex;align-items:center;gap:8px;padding:8px 16px;border-top:1px solid rgba(154,101,21,0.1);flex-wrap:wrap}
.like-btn{display:flex;align-items:center;gap:5px;background:transparent;border:1px solid rgba(154,101,21,0.3);border-radius:20px;padding:4px 12px;font-size:12px;color:rgba(212,205,164,0.6);transition:all .15s}
.like-btn:hover{border-color:rgba(154,101,21,0.7);color:#d4cda4}
.like-btn.liked{border-color:rgba(255,184,51,0.6);color:#ffb833;background:rgba(154,101,21,0.15)}
.post-mod-actions{margin-left:auto;display:flex;gap:6px}
/* EDITOR */
.f-editor-wrap{background:rgba(0,0,0,0.3);border:1px solid rgba(154,101,21,0.4);border-radius:8px;overflow:hidden;margin-top:12px}
.f-toolbar{display:flex;gap:2px;padding:8px 10px;border-bottom:1px solid rgba(154,101,21,0.25);flex-wrap:wrap;background:rgba(0,0,0,0.2)}
.f-tb-btn{background:rgba(154,101,21,0.1);border:1px solid rgba(154,101,21,0.3);border-radius:3px;color:#d4cda4;padding:3px 9px;font-size:12px;min-width:30px;text-align:center}.f-tb-btn:hover{background:rgba(154,101,21,0.3);color:#fff}
.f-editor-wrap textarea{border:none;border-radius:0;background:transparent;padding:12px 14px;font-size:13px;line-height:1.6;min-height:140px;resize:vertical;width:100%}
.f-editor-wrap textarea:focus{border:none;box-shadow:none}
.f-editor-footer{display:flex;align-items:center;gap:10px;padding:10px 12px;border-top:1px solid rgba(154,101,21,0.2);flex-wrap:wrap}
.f-att-list{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.f-att-chip{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.4);border:1px solid rgba(154,101,21,0.3);border-radius:20px;padding:3px 10px;font-size:11px}
.f-att-chip button{background:transparent;border:none;color:#666;padding:0 0 0 4px;font-size:12px;cursor:pointer;line-height:1}.f-att-chip button:hover{color:#ff6666}
/* FORM */
.f-form-card{background:rgba(0,0,0,0.3);border:1px solid rgba(154,101,21,0.35);border-radius:8px;padding:20px}
.f-form-label{font-size:11px;color:rgba(212,205,164,0.5);letter-spacing:1px;margin-bottom:6px;display:block;text-transform:uppercase}
.f-title-input{font-size:15px;margin-bottom:14px;padding:8px 12px}
.f-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:rgba(212,205,164,0.5);margin-bottom:16px;cursor:pointer;border:none;background:none;padding:0}
.f-back:hover{color:#d4cda4}
/* REPLY */
.reply-section{margin-top:20px}
.reply-section h3{font-size:12px;letter-spacing:2px;color:rgba(212,205,164,0.4);margin-bottom:12px;text-transform:uppercase}
.login-prompt{background:rgba(0,0,0,0.3);border:1px solid rgba(154,101,21,0.3);border-radius:8px;padding:20px;text-align:center;color:rgba(212,205,164,0.5);font-size:13px}
.login-prompt a{color:#ffb833}
/* INLINE EDIT */
.post-edit-wrap{padding:4px 0}
.post-edit-actions{display:flex;gap:8px;margin-top:8px}
</style>
</head>

var curLang = 'en';

function t(key, vars) {
    var s = (LANGS[curLang] || LANGS.en)[key];
    if (s === undefined) s = LANGS.en[key];
    if (s === undefined) s = key;
    if (vars) s = s.replace(/\{(\w+)\}/g, function(_, k) { return vars[k] !== undefined ? vars[k] : '{'+k+'}'; });
    return s;
}

function initLang() {
    var saved = localStorage.getItem('unoForumLang');
    if (saved && LANGS[saved]) { curLang = saved; }
    else {
        var bl = (navigator.language || 'en').replace('_','-');
        var found = LANG_BROWSER_MAP[bl] || LANG_BROWSER_MAP[bl.split('-')[0]];
        if (found && LANGS[found]) curLang = found;
    }
    // Populate selector
    var sel = document.getElementById('f-lang-sel');
    Object.keys(LANGS).forEach(function(k) {
        var o = document.createElement('option');
        o.value = k; o.textContent = LANGS[k].name;
        if (k === curLang) o.selected = true;
        sel.appendChild(o);
    });
    document.documentElement.lang = curLang;
}

function setLang(code) {
    if (!LANGS[code]) return;
    curLang = code;
    localStorage.setItem('unoForumLang', code);
    document.documentElement.lang = code;
    route();
    renderUserBar();
}

/* ── UTILS ──────────────────────────────────────────────────────────────── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function relTime(ms){
    if(!ms) return '';
    var d=Date.now()-ms;
    if(d<60000) return t('just_now');
    if(d<3600000) return t('m_ago',{n:Math.floor(d/60000)});
    if(d<86400000) return t('h_ago',{n:Math.floor(d/3600000)});
    if(d<604800000) return t('d_ago',{n:Math.floor(d/86400000)});
    return new Date(ms).toLocaleDateString();
}
function fmtDate(ms){ return ms?new Date(ms).toLocaleString():''; }
function authHdr(){ var tok=localStorage.getItem('unoAuthToken'); return tok?{Authorization:'Bearer '+tok}:{}; }
function jsonHdr(){ return Object.assign({'Content-Type':'application/json'},authHdr()); }
function fmtSize(b){ if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
function roleLabel(r){
    if(r>=2) return ' <span class="f-role-admin">'+t('admin')+'</span>';
    if(r>=1) return ' <span class="f-role-mod">'+t('mod')+'</span>';
    return '';
}

/* ── MARKDOWN ───────────────────────────────────────────────────────────── */
function renderMd(raw){
    if(!raw) return '';
    var parts=[],last=0,m;
    var cRx=/```(\w*)\n?([\s\S]*?)```/g;
    while((m=cRx.exec(raw))!==null){
        parts.push({t:'text',v:raw.slice(last,m.index)});
        parts.push({t:'code',v:m[2],lang:m[1]});
        last=m.index+m[0].length;
    }
    parts.push({t:'text',v:raw.slice(last)});
    return parts.map(function(p){ return p.t==='code'?'<pre><code>'+esc(p.v.trim())+'</code></pre>':renderInline(p.v); }).join('');
}
function safeUrl(u){ return /^javascript:/i.test((u||'').trim())?'#':u; }
function renderInline(raw){
    var codes=[],t2=raw;
    t2=t2.replace(/`([^`\n]+?)`/g,function(_,c){ codes.push(c); return '\x00C'+(codes.length-1)+'\x00'; });
    t2=esc(t2);
    t2=t2.replace(/\x00C(\d+)\x00/g,function(_,i){ return '<code>'+esc(codes[i])+'</code>'; });
    t2=t2.replace(/^(&gt;) ?(.*)/gm,'<blockquote>$2</blockquote>');
    t2=t2.replace(/^### (.+)$/gm,'<h3>$1</h3>');
    t2=t2.replace(/^## (.+)$/gm,'<h2>$1</h2>');
    t2=t2.replace(/^# (.+)$/gm,'<h1>$1</h1>');
    t2=t2.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    t2=t2.replace(/__(.+?)__/g,'<strong>$1</strong>');
    t2=t2.replace(/\*([^\n*]+?)\*/g,'<em>$1</em>');
    t2=t2.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,function(_,alt,url){ return '<img src="'+safeUrl(url)+'" alt="'+alt+'" style="max-width:100%;border-radius:4px;margin:4px 0">'; });
    t2=t2.replace(/\[([^\]]+)\]\(([^)]+)\)/g,function(_,txt,url){ return '<a href="'+safeUrl(url)+'" target="_blank" rel="noopener">'+txt+'</a>'; });
    t2=t2.replace(/\n\n+/g,'</p><p>');
    t2=t2.replace(/\n/g,'<br>');
    return '<p>'+t2+'</p>';
}

/* ── TOOLBAR ────────────────────────────────────────────────────────────── */
function toolbarHtml(taId){
    var btns=[['<b>B</b>','bold'],['<i>I</i>','italic'],['`code`','icode'],['```','cblock'],['link','link'],['img','img'],['&gt;quote','quote']];
    return '<div class="f-toolbar">'+btns.map(function(b){ return '<button type="button" class="f-tb-btn" onclick="tb(\''+taId+'\',\''+b[1]+'\')">'+b[0]+'</button>'; }).join('')+'</div>';
}
function tb(id,action){
    var ta=document.getElementById(id); if(!ta) return;
    var s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.slice(s,e);
    var ins='',cur=0;
    switch(action){
        case 'bold':  ins='**'+(sel||'bold')+'**';cur=sel?0:-2;break;
        case 'italic':ins='*'+(sel||'italic')+'*';cur=sel?0:-1;break;
        case 'icode': ins='`'+(sel||'code')+'`';cur=sel?0:-1;break;
        case 'cblock':ins='```\n'+(sel||'code')+'\n```';cur=sel?0:-4;break;
        case 'link':  ins='['+(sel||'text')+'](https://)';cur=-1;break;
        case 'img':   ins='!['+(sel||'alt')+'](https://)';cur=-1;break;
        case 'quote': ins='> '+(sel||'quote');cur=0;break;
    }
    ta.value=ta.value.slice(0,s)+ins+ta.value.slice(e);
    var p=s+ins.length+cur; ta.setSelectionRange(p,p); ta.focus();
}

/* ── AUTH ───────────────────────────────────────────────────────────────── */
var me=null;
function initAuth(){
    var tok=localStorage.getItem('unoAuthToken');
    if(!tok){ renderUserBar(); return Promise.resolve(); }
    return fetch('/api/auth/me',{headers:{Authorization:'Bearer '+tok}})
        .then(function(r){ return r.ok?r.json():null; })
        .then(function(d){ me=d&&d.id?d:null; renderUserBar(); })
        .catch(function(){ me=null; renderUserBar(); });
}
function goBackToGame(){
    // The forum is always opened via window.open() from the game (see openForum()
    // in Authorize.vue), so the original game tab is already sitting open elsewhere —
    // navigating this tab to "/" instead of closing it boots a second live game
    // session under the same login, which bumps/disconnects the original tab.
    // window.close() only works on script-opened windows and is a silent no-op
    // otherwise, so fall back to navigating here if the tab is still around.
    window.close();
    setTimeout(function(){ location.href = '/'; }, 300);
}
function renderUserBar(){
    var el=document.getElementById('f-user');
    if(me){
        el.innerHTML='<span class="f-uname">'+esc(me.username)+'</span>'
            +(me.is_admin>=2?'<span class="f-role-admin">'+t('admin')+'</span>':me.is_admin>=1?'<span class="f-role-mod">'+t('mod')+'</span>':'')
            +'<a href="/" class="f-game-link" onclick="goBackToGame();return false;">'+t('go_game')+'</a>';
    } else {
        el.innerHTML='<span style="font-size:11px;color:rgba(212,205,164,0.35)">'+t('not_logged')+'</span>'
            +'<a href="/" class="f-game-link" onclick="goBackToGame();return false;">'+t('login_game')+'</a>';
    }
}
function setBreadcrumb(html){ document.getElementById('f-breadcrumb').innerHTML=html||''; }

/* ── ROUTING ────────────────────────────────────────────────────────────── */
function route(){
    var h=location.hash||'#/',m;
    if(h==='#/'||h==='#') return loadBoards();
    m=h.match(/^#\/board\/(\d+)(?:\/(\d+))?$/); if(m) return loadThreads(+m[1],+m[2]||1);
    m=h.match(/^#\/thread\/(\d+)(?:\/(\d+))?$/); if(m) return loadThread(+m[1],+m[2]||1);
    m=h.match(/^#\/new\/(\d+)$/); if(m) return loadNewThread(+m[1]);
    loadBoards();
}
window.addEventListener('hashchange',route);

function setApp(html){ document.getElementById('f-app').innerHTML=html; }

/* ── BOARDS ─────────────────────────────────────────────────────────────── */
function loadBoards(){
    document.title='UNO Forum'; setBreadcrumb('');

    fetch('/api/forum/boards').then(function(r){ return r.json(); }).then(showBoards)
        .catch(function(){ setApp('<div class="f-error">'+t('load_fail')+'</div>'); });
}
function showBoards(boards){
    if(!boards.length){ setApp('<div class="f-empty">'+t('no_boards')+'</div>'); return; }
    var icons=['🎮','🏆','💬','🃏','🔥','⭐','📢','🎯'];
    var html='<div class="f-section-title">'+t('boards')+'</div>';
    html+=boards.map(function(b,i){
        var last=b.last_activity?relTime(b.last_activity):t('never');
        return '<a class="board-card" href="#/board/'+b.id+'">'
            +'<div class="board-icon">'+icons[i%icons.length]+'</div>'

            +(b.description?'<div class="board-desc">'+esc(b.description)+'</div>':'')

/* ── THREADS ────────────────────────────────────────────────────────────── */
var _curBoard=null;
function loadThreads(boardId,page){

        .catch(function(){ setApp('<div class="f-error">'+t('board_404')+'</div>'); });
}
function showThreads(d){
    var board=d.board,threads=d.threads,page=d.page,pages=d.pages;

    setBreadcrumb('<a href="#/">Forum</a> › '+esc(board.name));

        +'<div class="f-board-hdr"><div class="f-board-hdr-info">'

/* ── THREAD VIEW ────────────────────────────────────────────────────────── */
var _curThread=null,_curPosts=null;
function loadThread(threadId,page){
    setApp('<div class="f-loading">'+t('loading')+'</div>');
    fetch('/api/forum/threads/'+threadId+'?page='+(page||1),{headers:authHdr()})
        .then(function(r){ if(!r.ok) throw 0; return r.json(); })
        .then(function(d){ _curThread=d.thread; _curPosts=d; showThread(d); })
        .catch(function(){ setApp('<div class="f-error">'+t('thread_404')+'</div>'); });
}
function showThread(d){
    var thread=d.thread,posts=d.posts,page=d.page,pages=d.pages,uid=d.currentUserId,urole=d.currentUserRole;
    document.title='UNO Forum — '+thread.title;
    setBreadcrumb('<a href="#/">Forum</a> › <a href="#/board/'+thread.board_id+'">'+esc(thread.board_name||'')+'</a> › '+esc(thread.title).slice(0,40));
    var canMod=(urole||0)>=1,canAdmin=(urole||0)>=2;
    var html='<button class="f-back" onclick="location.hash=\'#/board/'+thread.board_id+'\'">'+t('back')+'</button>'
        +'<div class="thread-view-hdr"><div class="thread-view-title">'+esc(thread.title)
        +(thread.pinned?'<span class="badge-pinned" style="font-size:11px">'+t('pinned')+'</span>':'')
        +(thread.locked?'<span class="badge-locked" style="font-size:11px">'+t('locked')+'</span>':'')
        +'</div><div class="thread-view-meta"><span>by '+esc(thread.username)+roleLabel(thread.is_admin||0)+'</span>'
        +'<span>'+fmtDate(thread.created_at)+'</span><span>'+thread.views+' '+t('views')+'</span></div>'
        +(canMod?'<div class="thread-mod-bar">'
            +'<button class="btn btn-sm btn-dim" onclick="actLock('+thread.id+','+!!thread.locked+')">'+(thread.locked?t('unlock'):t('lock'))+'</button>'
            +(canAdmin?'<button class="btn btn-sm btn-dim" onclick="actPin('+thread.id+','+!!thread.pinned+')">'+(thread.pinned?t('unpin'):t('pin'))+'</button>':'')
            +'<button class="btn btn-sm btn-red" onclick="actDelThread('+thread.id+',\''+thread.board_id+'\')">'+t('del_thread')+'</button></div>':'')
        +'</div>';
    html+=posts.map(function(p,i){
        var isOwn=(uid&&p.user_id===uid),canEdit=(isOwn||canMod);
        var av=p.has_avatar?'/api/profile/avatar/'+p.user_id:'/img/default.png';
        return '<div class="post-card'+(i===0&&page===1?' post-first':'')+'" id="post-'+p.id+'">'
            +'<div class="post-meta"><img class="post-avatar" src="'+av+'" onerror="this.src=\'/img/default.png\'"/>'
            +'<div class="post-author-info"><div class="post-uname">'+esc(p.username)+roleLabel(p.is_admin||0)+'</div>'
            +'<div class="post-stats">'+t('user_posts',{n:p.user_post_count})+'</div></div>'
            +'<div class="post-date">'+relTime(p.created_at)+(p.edited_at?'<div class="post-edited">'+t('edited')+' '+relTime(p.edited_at)+'</div>':'')+'</div></div>'
            +'<div class="post-body"><div class="post-content" id="pcontent-'+p.id+'">'+renderMd(p.content)+'</div></div>'
            +(p.attachments&&p.attachments.length?'<div class="post-attachments">'+p.attachments.map(function(a){
                return /^image\//i.test(a.mime_type)
                    ?'<a href="/api/forum/attachment/'+a.id+'" target="_blank"><img class="post-att-img" src="/api/forum/attachment/'+a.id+'" alt="'+esc(a.original_name)+'"></a>'
                    :'<a class="post-att-file" href="/api/forum/attachment/'+a.id+'" target="_blank">📎 '+esc(a.original_name)+' ('+fmtSize(a.size)+')</a>';
            }).join('')+'</div>':'')
            +'<div class="post-actions"><button class="like-btn'+(p.liked?' liked':'')+'" id="like-'+p.id+'" onclick="actLike('+p.id+')" '+(uid?'':'disabled')+'>'
            +'👍 <span id="lc-'+p.id+'">'+p.likes+'</span></button>'
            +(canEdit?'<div class="post-mod-actions">'
                +(isOwn||canMod?'<button class="btn btn-xs btn-dim" onclick="actEdit('+p.id+')">'+t('edit')+'</button>':'')
                +'<button class="btn btn-xs btn-red" onclick="actDelPost('+p.id+','+thread.id+','+page+')">'+t('del')+'</button>'
                +'</div>':'')
            +'</div></div>';
    }).join('');
    html+=pagHtml(pages,page,function(p){ return '#/thread/'+thread.id+'/'+p; });
    html+='<div class="reply-section"><h3>'+t('reply_h')+'</h3>';
    if(!uid) html+='<div class="login-prompt">'+t('login_msg',{link:'<a href="/">'+t('login_link')+'</a>'})+'</div>';
    else if(thread.locked&&!canMod) html+='<div class="login-prompt">'+t('locked_msg')+'</div>';
    else html+=replyFormHtml(thread.id);
    html+='</div>';
    setApp(html);
}
function replyFormHtml(threadId){

        +'<button class="btn btn-gold btn-sm" onclick="actReply('+threadId+')">'+t('post_reply')+'</button>'
        +'</div></div>';
}

/* ── PAGINATION ─────────────────────────────────────────────────────────── */
function pagHtml(pages,page,hashFn){
    if(pages<=1) return '';
    var html='<div class="f-pag">';
    if(page>1) html+='<a class="btn btn-sm btn-dim" href="'+hashFn(page-1)+'">'+t('prev')+'</a>';
    html+='<span class="f-pag-info">'+t('page',{p:page,t:pages})+'</span>';
    if(page<pages) html+='<a class="btn btn-sm btn-dim" href="'+hashFn(page+1)+'">'+t('next')+'</a>';
    return html+'</div>';
}

/* ── ACTIONS ────────────────────────────────────────────────────────────── */
var _pendingAtt=[];
function actLike(postId){
    if(!me) return;
    fetch('/api/forum/posts/'+postId+'/like',{method:'POST',headers:jsonHdr()}).then(function(r){return r.json();}).then(function(d){
        if(d.ok){
            var btn=document.getElementById('like-'+postId),cnt=document.getElementById('lc-'+postId);
            if(btn){d.liked?btn.classList.add('liked'):btn.classList.remove('liked');}
            if(cnt) cnt.textContent=d.count;
        }
    });
}
function actEdit(postId){
    var contentDiv=document.getElementById('pcontent-'+postId); if(!contentDiv) return;
    var raw='';
    if(_curPosts&&_curPosts.posts){var p=_curPosts.posts.find(function(x){return x.id===postId;});if(p)raw=p.content;}
    contentDiv.innerHTML='<div class="post-edit-wrap">'+toolbarHtml('pedit-'+postId)
        +'<textarea id="pedit-'+postId+'" style="min-height:100px;width:100%">'+esc(raw)+'</textarea>'
        +'<div class="post-edit-actions">'
        +'<button class="btn btn-gold btn-sm" onclick="actSaveEdit('+postId+')">'+t('save')+'</button>'
        +'<button class="btn btn-dim btn-sm" onclick="actCancelEdit('+postId+')">'+t('cancel')+'</button>'
        +'</div></div>';
}
function actSaveEdit(postId){
    var ta=document.getElementById('pedit-'+postId); if(!ta) return;
    var content=ta.value.trim(); if(!content) return;
    fetch('/api/forum/posts/'+postId,{method:'PUT',headers:jsonHdr(),body:JSON.stringify({content:content})})
        .then(function(r){return r.json();}).then(function(d){
            if(d.ok){
                if(_curPosts&&_curPosts.posts){var p=_curPosts.posts.find(function(x){return x.id===postId;});if(p){p.content=content;p.edited_at=Date.now();}}
                var el=document.getElementById('pcontent-'+postId); if(el) el.innerHTML=renderMd(content);
            }
        });
}
function actCancelEdit(postId){
    var raw='';
    if(_curPosts&&_curPosts.posts){var p=_curPosts.posts.find(function(x){return x.id===postId;});if(p)raw=p.content;}
    var el=document.getElementById('pcontent-'+postId); if(el) el.innerHTML=renderMd(raw);
}
function actDelPost(postId,threadId,page){
    if(!confirm(t('del_post_q'))) return;
    fetch('/api/forum/posts/'+postId,{method:'DELETE',headers:authHdr()}).then(function(r){return r.json();}).then(function(d){if(d.ok)loadThread(threadId,page);});
}
function actReply(threadId){
    var ta=document.getElementById('reply-ta'); if(!ta||!ta.value.trim()) return;
    var attIds=_pendingAtt.map(function(a){return a.id;});
    fetch('/api/forum/threads/'+threadId+'/posts',{method:'POST',headers:jsonHdr(),body:JSON.stringify({content:ta.value.trim(),attachments:attIds})})
        .then(function(r){return r.json();}).then(function(d){if(d.ok){_pendingAtt=[];if(_curThread)loadThread(_curThread.id,9999);}});
}
function actCreateThread(boardId){
    var title=(document.getElementById('nt-title')||{}).value||'';
    var body=(document.getElementById('nt-body')||{}).value||'';
    var errEl=document.getElementById('nt-err');
    if(!title.trim()||!body.trim()){if(errEl){errEl.style.display='';errEl.textContent=t('required');}return;}
    var attIds=_pendingAtt.map(function(a){return a.id;});
    fetch('/api/forum/boards/'+boardId+'/threads',{method:'POST',headers:jsonHdr(),body:JSON.stringify({title:title.trim(),content:body.trim(),attachments:attIds})})
        .then(function(r){return r.json();}).then(function(d){if(d.ok){_pendingAtt=[];location.hash='#/thread/'+d.id;}else if(errEl){errEl.style.display='';errEl.textContent=d.error||t('load_fail');}});
}
function actLock(threadId){
    fetch('/api/forum/threads/'+threadId+'/lock',{method:'PUT',headers:jsonHdr()}).then(function(r){return r.json();}).then(function(d){if(d.ok)loadThread(threadId,1);});
}
function actPin(threadId){
    fetch('/api/forum/threads/'+threadId+'/pin',{method:'PUT',headers:jsonHdr()}).then(function(r){return r.json();}).then(function(d){if(d.ok)loadThread(threadId,1);});
}
function actDelThread(threadId,boardId){
    if(!confirm(t('del_thread_q'))) return;
    fetch('/api/forum/threads/'+threadId,{method:'DELETE',headers:authHdr()}).then(function(r){return r.json();}).then(function(d){if(d.ok)location.hash='#/board/'+boardId;});
}
function uploadAtt(input,target){
    var file=input.files[0]; if(!file) return; input.value='';
    var fd=new FormData(); fd.append('file',file);
    fetch('/api/forum/attachments/upload',{method:'POST',headers:authHdr(),body:fd})
        .then(function(r){return r.json();}).then(function(d){if(d.ok){_pendingAtt.push({id:d.id,name:d.name,size:d.size,mime:d.mime});renderPendingAtts(target);}});
}
function removeAtt(idx,target){_pendingAtt.splice(idx,1);renderPendingAtts(target);}
function renderPendingAtts(target){
    var el=document.getElementById(target==='new'?'nt-att-list':'reply-att-list'); if(!el) return;
    el.innerHTML=_pendingAtt.map(function(a,i){
        return '<span class="f-att-chip">'+esc(a.name)+'<button type="button" onclick="removeAtt('+i+',\''+target+'\')">&#10005;</button></span>';
    }).join('');
}

/* ── INIT ───────────────────────────────────────────────────────────────── */
initLang();
initAuth().then(route);
</script>
